<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>خروج از حساب | Luna Florale</title>
<style>
body{margin:0;font-family:Tahoma,sans-serif;background:#f5f0fa;display:grid;place-items:center;min-height:100vh;padding:20px}
.card{background:#fff;max-width:520px;width:100%;border-radius:24px;padding:36px;box-shadow:0 15px 40px rgba(75,46,131,.12);text-align:center}
.icon{width:72px;height:72px;border-radius:50%;background:#f5f0fa;margin:0 auto 18px;display:grid;place-items:center;font-size:34px}
h1{color:#4B2E83;font-size:28px;margin:0 0 10px}
p{color:#666;line-height:2;margin:0 0 28px}
.buttons{display:grid;gap:14px}
button{border:0;border-radius:14px;padding:16px;font-size:15px;cursor:pointer;transition:.2s}
.stay{background:#4B2E83;color:#fff}
.leave{background:#f5f0fa;color:#4B2E83;border:1px solid #d8c7ec}
button:hover{transform:translateY(-2px)}
.note{margin-top:18px;font-size:12px;color:#888}
</style>
</head>
<body>
<div class="card">
<div class="icon">🌙</div>
<h1>آیا از خروج حساب کاربری خود اطمینان دارید؟</h1>
<p>بودنت کنار <strong>Luna Florale</strong> برای ما ارزشمنده؛ امیدواریم خیلی زود دوباره ببینیمت.</p>
<div class="buttons">
<button class="stay" onclick="alert('🌸 چه عالی! خوشحالیم که کنار لونا موندی.')">خیر، من به لونا وفادارم</button>
<button class="leave" >بله، ولی قول میدم زود برگردم</button>
</div>
<div class="note">نسخه نمایشی رابط کاربری</div>
</div>

<div id="goodbyeOverlay" style="position:fixed;inset:0;background:#f5f0fa;display:none;align-items:center;justify-content:center;z-index:9999;opacity:0;transition:.6s">
  <div style="text-align:center">
    <div style="font-size:56px;margin-bottom:18px">🌙</div>
    <h2 style="color:#4B2E83;margin:0 0 12px">به امید دیدار دوباره...</h2>
    <div style="color:#6b5a80;margin-bottom:10px">Flowers Designed to Be Remembered</div>
  </div>
</div>
<script>
const leaveBtn=document.querySelector('.leave');
leaveBtn.onclick=function(){
 const ov=document.getElementById('goodbyeOverlay');
 ov.style.display='flex';
 requestAnimationFrame(()=>ov.style.opacity='1');
 setTimeout(()=>{
   alert('حساب کاربری با موفقیت خارج شد. منتظر برگشتت هستیم 🌷');
   // window.location.href='index.html';
 },1200);
};
</script>

</body>
</html>
